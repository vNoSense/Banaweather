<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Weather</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8f4fd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weather">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sky: #c9e8f7;
  --sky2: #e8f4fd;
  --glass: rgba(255,255,255,0.62);
  --glass-border: rgba(255,255,255,0.85);
  --glass-shadow: rgba(30,80,160,0.10);
  --cobalt: #1a56db;
  --cobalt-light: #3b82f6;
  --text: #1a1a2e;
  --muted: #5a6a8a;
  --warm: #f59e0b;
  --rain: #3b82f6;
  --card-radius: 20px;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--sky2);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ─── SKY BACKGROUND ─────────────────────── */
#sky-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  transition: background 2s ease;
  background: linear-gradient(175deg, #bde0f7 0%, #dff0fb 50%, #f0f8ff 100%);
}

/* ─── MAP ─────────────────────────────────── */
#map-container {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56vh;
  z-index: 1;
}
#map { width: 100%; height: 100%; }

/* Leaflet attribution smaller */
.leaflet-control-attribution { font-size: 9px !important; }

/* ─── CURRENT WEATHER STRIP ───────────────── */
#current-strip {
  position: fixed;
  top: calc(56vh - 28px);
  left: 0; right: 0;
  z-index: 10;
  padding: 0 16px;
  display: flex;
  gap: 10px;
  align-items: stretch;
  height: 56px;
}
.strip-card {
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 4px 20px var(--glass-shadow);
  white-space: nowrap;
}
.strip-location {
  flex: 1;
  min-width: 0;
}
.strip-loc-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
}
.strip-temp {
  font-family: 'DM Sans', sans-serif;
  font-size: 26px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
}
.strip-icon { font-size: 22px; }
.strip-refresh {
  background: none;
  border: 1px solid rgba(30,80,160,0.18);
  color: var(--muted);
  cursor: pointer;
  border-radius: 10px;
  padding: 0 12px;
  height: 40px;
  font-size: 16px;
  font-family: 'Inter', sans-serif;
  transition: all 0.2s;
  flex-shrink: 0;
}
.strip-refresh:active { background: rgba(30,80,160,0.08); }

/* ─── SCROLL PANEL ────────────────────────── */
#scroll-panel {
  position: fixed;
  top: calc(56vh + 36px);
  left: 0; right: 0;
  bottom: 0;
  z-index: 5;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 14px 32px;
  scrollbar-width: none;
}
#scroll-panel::-webkit-scrollbar { display: none; }

/* ─── STAT ROW ────────────────────────────── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.stat-card {
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: var(--card-radius);
  padding: 12px 10px;
  text-align: center;
  box-shadow: 0 2px 12px var(--glass-shadow);
}
.stat-icon { font-size: 18px; margin-bottom: 4px; }
.stat-val {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.1;
}
.stat-lbl {
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* ─── SECTION LABEL ───────────────────────── */
.section-lbl {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 2px 8px;
}

/* ─── HOURLY SCROLL ───────────────────────── */
.hourly-track {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 10px;
  scrollbar-width: none;
}
.hourly-track::-webkit-scrollbar { display: none; }
.hour-card {
  flex: 0 0 64px;
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 10px 6px;
  text-align: center;
  box-shadow: 0 2px 12px var(--glass-shadow);
  transition: border-color 0.2s;
}
.hour-card.now {
  border-color: var(--cobalt);
  background: rgba(59,130,246,0.12);
}
.hour-time {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.hour-card.now .hour-time { color: var(--cobalt); }
.hour-ico { font-size: 20px; margin-bottom: 5px; }
.hour-tmp {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.hour-prec { font-size: 10px; color: var(--rain); margin-top: 3px; font-weight: 600; }

/* ─── PRECIP BAR ──────────────────────────── */
.precip-card {
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: var(--card-radius);
  padding: 14px 16px;
  box-shadow: 0 2px 12px var(--glass-shadow);
  margin-bottom: 10px;
}
.precip-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.precip-lbl { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
.precip-pct { font-size: 16px; font-weight: 600; color: var(--cobalt); }
.precip-track { height: 8px; background: rgba(30,80,160,0.1); border-radius: 4px; overflow: hidden; }
.precip-fill { height: 100%; background: linear-gradient(90deg, #60a5fa, #1a56db); border-radius: 4px; transition: width 1s ease; }

/* ─── TEMP CURVE ──────────────────────────── */
.curve-card {
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-border);
  border-radius: var(--card-radius);
  padding: 14px 14px 10px;
  box-shadow: 0 2px 12px var(--glass-shadow);
  margin-bottom: 10px;
}
#temp-curve { width: 100%; display: block; }

/* ─── BOTTOM SHEET (area detail) ──────────── */
#bottom-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
#bottom-sheet.open { transform: translateY(0); }
#sheet-inner {
  background: rgba(232,244,253,0.96);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 24px 24px 0 0;
  padding: 12px 20px 40px;
  border-top: 1px solid var(--glass-border);
  box-shadow: 0 -8px 40px rgba(30,80,160,0.12);
}
#sheet-handle {
  width: 40px; height: 4px;
  background: rgba(30,80,160,0.2);
  border-radius: 2px;
  margin: 0 auto 16px;
}
#sheet-close {
  float: right;
  background: rgba(30,80,160,0.1);
  border: none;
  border-radius: 50%;
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  margin-top: -4px;
}
#sheet-area-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
#sheet-temp {
  font-family: 'DM Sans', sans-serif;
  font-size: 52px;
  font-weight: 300;
  color: var(--text);
  line-height: 1;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
#sheet-icon { font-size: 40px; margin-top: 4px; }
#sheet-condition { font-size: 16px; color: var(--muted); margin: 6px 0 14px; }
.sheet-stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.sheet-stat {
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 10px;
  text-align: center;
}
.sheet-stat-v { font-size: 16px; font-weight: 600; color: var(--text); }
.sheet-stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
#sheet-loading { text-align: center; padding: 20px 0; color: var(--muted); font-size: 14px; }

/* ─── MY LOCATION MARKER ──────────────────── */
.my-marker {
  width: 18px; height: 18px;
  background: #1a56db;
  border: 3px solid white;
  border-radius: 50%;
  box-shadow: 0 0 0 4px rgba(26,86,219,0.25), 0 2px 8px rgba(0,0,0,0.2);
  animation: myPulse 2s ease infinite;
}
@keyframes myPulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(26,86,219,0.25), 0 2px 8px rgba(0,0,0,0.2); }
  50%      { box-shadow: 0 0 0 10px rgba(26,86,219,0.08), 0 2px 8px rgba(0,0,0,0.2); }
}

/* ─── AREA MARKERS ────────────────────────── */
.area-marker {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(8px);
  border: 1.5px solid rgba(26,86,219,0.25);
  border-radius: 20px;
  padding: 4px 9px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: #1a1a2e;
  white-space: nowrap;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(30,80,160,0.12);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.area-marker:active { transform: scale(0.95); }
.area-marker.loading { opacity: 0.6; }

/* ─── STATE SCREENS ───────────────────────── */
#loading-screen, #error-screen {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; text-align: center; padding: 32px;
  background: linear-gradient(175deg, #bde0f7 0%, #e8f4fd 100%);
}
.hidden { display: none !important; }
.spinner {
  width: 42px; height: 42px;
  border: 3px solid rgba(26,86,219,0.15);
  border-top-color: #1a56db;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-ico { font-size: 48px; }
.state-title { font-size: 19px; font-weight: 600; color: var(--text); }
.state-sub { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.5; }
.retry-btn {
  margin-top: 4px; padding: 11px 26px;
  background: #1a56db; color: white;
  border: none; border-radius: 12px;
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; box-shadow: 0 4px 16px rgba(26,86,219,0.3);
}

/* overlay for closing sheet */
#overlay {
  position: fixed; inset: 0; z-index: 99;
  background: rgba(30,50,100,0.15);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#overlay.on { opacity: 1; pointer-events: all; }

.updated-line {
  text-align: center; font-size: 11px; color: var(--muted);
  padding-top: 10px; letter-spacing: 0.03em;
}
</style>
</head>
<body>

<div id="sky-bg"></div>

<!-- Loading -->
<div id="loading-screen">
  <div class="spinner"></div>
  <div class="state-title">Getting your location…</div>
  <div class="state-sub">Allow location access when prompted.</div>
</div>

<!-- Error -->
<div id="error-screen" class="hidden">
  <div class="state-ico">🌫️</div>
  <div class="state-title" id="err-title">Location unavailable</div>
  <div class="state-sub" id="err-msg">Enable location access in your browser settings.</div>
  <button class="retry-btn" onclick="init()">Try again</button>
</div>

<!-- Map -->
<div id="map-container" class="hidden">
  <div id="map"></div>
</div>

<!-- Current strip -->
<div id="current-strip" class="hidden">
  <div class="strip-card strip-location">
    <span class="strip-icon" id="strip-icon">⛅</span>
    <div>
      <div class="strip-loc-name" id="strip-loc">—</div>
      <div class="strip-temp" id="strip-temp">—°</div>
    </div>
  </div>
  <button class="strip-card strip-refresh" onclick="init()" title="Refresh">↻</button>
</div>

<!-- Scroll panel -->
<div id="scroll-panel" class="hidden">
  <div class="stat-row" id="stat-row">
    <div class="stat-card"><div class="stat-icon">🌡️</div><div class="stat-val" id="s-feels">—</div><div class="stat-lbl">Feels like</div></div>
    <div class="stat-card"><div class="stat-icon">💧</div><div class="stat-val" id="s-hum">—</div><div class="stat-lbl">Humidity</div></div>
    <div class="stat-card"><div class="stat-icon">💨</div><div class="stat-val" id="s-wind">—</div><div class="stat-lbl">Wind</div></div>
    <div class="stat-card"><div class="stat-icon">👁️</div><div class="stat-val" id="s-vis">—</div><div class="stat-lbl">Visibility</div></div>
  </div>

  <div class="precip-card">
    <div class="precip-header">
      <span class="precip-lbl">Rain chance</span>
      <span class="precip-pct" id="precip-pct">—%</span>
    </div>
    <div class="precip-track"><div class="precip-fill" id="precip-fill" style="width:0%"></div></div>
  </div>

  <div class="section-lbl">Hourly</div>
  <div class="hourly-track" id="hourly-track"></div>

  <div class="section-lbl">Temperature today</div>
  <div class="curve-card">
    <canvas id="temp-curve" height="80"></canvas>
  </div>

  <div class="updated-line" id="updated-line"></div>
</div>

<!-- Overlay -->
<div id="overlay" onclick="closeSheet()"></div>

<!-- Bottom sheet -->
<div id="bottom-sheet">
  <div id="sheet-inner">
    <div id="sheet-handle"></div>
    <button id="sheet-close" onclick="closeSheet()">✕</button>
    <div id="sheet-area-name">—</div>
    <div id="sheet-temp-row" style="display:flex;align-items:center;gap:12px;margin-bottom:2px">
      <div id="sheet-temp">—</div>
      <div id="sheet-icon">⛅</div>
    </div>
    <div id="sheet-condition">—</div>
    <div class="sheet-stat-row">
      <div class="sheet-stat"><div class="sheet-stat-v" id="sh-feels">—</div><div class="sheet-stat-l">Feels like</div></div>
      <div class="sheet-stat"><div class="sheet-stat-v" id="sh-hum">—</div><div class="sheet-stat-l">Humidity</div></div>
      <div class="sheet-stat"><div class="sheet-stat-v" id="sh-wind">—</div><div class="sheet-stat-l">Wind</div></div>
    </div>
    <div id="sheet-loading" class="hidden">Loading…</div>
  </div>
</div>

<script>
// ── CONDITION MAP ──────────────────────────────
const COND = {
  dry:          { label: 'Clear',        icon: '☀️' },
  fog:          { label: 'Foggy',        icon: '🌫️' },
  rain:         { label: 'Rain',         icon: '🌧️' },
  sleet:        { label: 'Sleet',        icon: '🌨️' },
  snow:         { label: 'Snow',         icon: '❄️' },
  hail:         { label: 'Hail',         icon: '🌩️' },
  thunderstorm: { label: 'Thunderstorm', icon: '⛈️' },
};
function getCond(code) {
  return COND[code] || { label: 'Partly Cloudy', icon: '⛅' };
}

// ── SKY BACKGROUND ─────────────────────────────
function setSkyBg(condition, hour) {
  const bg = document.getElementById('sky-bg');
  const skies = {
    rain:         'linear-gradient(175deg,#7bafc9 0%,#a8cde0 50%,#c5dded 100%)',
    thunderstorm: 'linear-gradient(175deg,#6a7fa0 0%,#8aa0be 50%,#b0c4d8 100%)',
    snow:         'linear-gradient(175deg,#c8dff0 0%,#deeef8 50%,#edf6fb 100%)',
    fog:          'linear-gradient(175deg,#a0b4c8 0%,#c0d2e0 50%,#d8e8f0 100%)',
  };
  if (skies[condition]) { bg.style.background = skies[condition]; return; }
  // time-of-day sky for clear/default
  if (hour >= 6 && hour < 9)       bg.style.background = 'linear-gradient(175deg,#f9c97c 0%,#fde4a8 40%,#c9e8f7 100%)';
  else if (hour >= 9 && hour < 17) bg.style.background = 'linear-gradient(175deg,#74c0e8 0%,#a8d8f0 40%,#daf0fc 100%)';
  else if (hour >= 17 && hour < 20) bg.style.background = 'linear-gradient(175deg,#f0845a 0%,#f7b87a 40%,#c8e0f4 100%)';
  else                              bg.style.background = 'linear-gradient(175deg,#1a2a4a 0%,#2a4a7a 40%,#4a7aaa 100%)';
}

// ── HELPERS ────────────────────────────────────
function fmt(n, d=0) { return n==null ? '—' : Number(n).toFixed(d); }
function windDir(deg) {
  if (deg==null) return '—';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}
function feelsLike(T, RH, V) {
  if (T==null) return null;
  if (V!=null && T<10 && V>4.8)
    return 13.12+0.6215*T-11.37*Math.pow(V,0.16)+0.3965*T*Math.pow(V,0.16);
  if (RH!=null && T>26)
    return -8.78469+1.61139411*T+2.3385*RH-0.14611*T*RH-0.012308*T*T
           -0.016424*RH*RH+0.002211*T*T*RH+0.00072546*T*RH*RH-0.000003582*T*T*RH*RH;
  return T;
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// ── REVERSE GEOCODE ────────────────────────────
async function reverseGeocode(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const d = await r.json();
    const a = d.address;
    return a.suburb||a.neighbourhood||a.quarter||a.city_district||a.city||a.town||a.village||'Your area';
  } catch { return 'Your area'; }
}

// ── FETCH WEATHER ──────────────────────────────
async function fetchWeather(lat, lon) {
  const date = new Date().toISOString().split('T')[0];
  const [cr, fr] = await Promise.all([
    fetch(`https://api.brightsky.dev/current_weather?lat=${lat}&lon=${lon}`),
    fetch(`https://api.brightsky.dev/weather?lat=${lat}&lon=${lon}&date=${date}&last_date=${date}T23:59:00`)
  ]);
  const cd = await cr.json();
  const fd = await fr.json();
  return { current: cd.weather, hourly: fd.weather||[] };
}

// ── MAP SETUP ──────────────────────────────────
let map, myMarker;
const areaMarkers = [];

// Berlin districts with lat/lon
const AREAS = [
  { name: 'Mitte',           lat: 52.5200, lon: 13.4050 },
  { name: 'Prenzlauer Berg', lat: 52.5390, lon: 13.4280 },
  { name: 'Friedrichshain',  lat: 52.5150, lon: 13.4540 },
  { name: 'Kreuzberg',       lat: 52.4990, lon: 13.4030 },
  { name: 'Neukölln',        lat: 52.4810, lon: 13.4350 },
  { name: 'Tempelhof',       lat: 52.4680, lon: 13.3830 },
  { name: 'Spandau',         lat: 52.5350, lon: 13.2000 },
  { name: 'Charlottenburg',  lat: 52.5160, lon: 13.3040 },
  { name: 'Pankow',          lat: 52.5690, lon: 13.4030 },
  { name: 'Treptow',         lat: 52.4890, lon: 13.4840 },
  { name: 'Köpenick',        lat: 52.4580, lon: 13.5790 },
  { name: 'Lichtenberg',     lat: 52.5120, lon: 13.5010 },
  { name: 'Schöneweide',     lat: 52.4590, lon: 13.5060 },
  { name: 'Steglitz',        lat: 52.4570, lon: 13.3220 },
  { name: 'Zehlendorf',      lat: 52.4320, lon: 13.2580 },
  { name: 'Reinickendorf',   lat: 52.5790, lon: 13.3420 },
];

function initMap(lat, lon) {
  if (map) { map.remove(); map = null; }
  areaMarkers.length = 0;

  map = L.map('map', {
    center: [lat, lon],
    zoom: 11,
    zoomControl: false,
    attributionControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 16
  }).addTo(map);

  // My location marker
  const myIcon = L.divIcon({ className: '', html: '<div class="my-marker"></div>', iconSize: [18,18], iconAnchor: [9,9] });
  myMarker = L.marker([lat, lon], { icon: myIcon }).addTo(map);

  // Area markers — load weather for visible ones
  AREAS.forEach(area => {
    const el = document.createElement('div');
    el.className = 'area-marker loading';
    el.innerHTML = `<span>${area.name}</span> <span class="am-temp">…</span>`;

    const icon = L.divIcon({ className: '', html: el, iconSize: null, iconAnchor: [0, 10] });
    const marker = L.marker([area.lat, area.lon], { icon }).addTo(map);

    // fetch weather for this area
    fetch(`https://api.brightsky.dev/current_weather?lat=${area.lat}&lon=${area.lon}`)
      .then(r => r.json())
      .then(d => {
        const w = d.weather;
        const cond = getCond(w?.condition);
        el.innerHTML = `<span>${cond.icon}</span><span>${area.name}</span><span style="font-weight:600;color:#1a56db">${fmt(w?.temperature)}°</span>`;
        el.classList.remove('loading');
      })
      .catch(() => { el.classList.remove('loading'); });

    marker.on('click', () => openSheet(area.name, area.lat, area.lon));
    areaMarkers.push({ marker, area });
  });
}

// ── BOTTOM SHEET ───────────────────────────────
function openSheet(name, lat, lon) {
  document.getElementById('sheet-area-name').textContent = name;
  document.getElementById('sheet-temp').textContent = '…';
  document.getElementById('sheet-icon').textContent = '⛅';
  document.getElementById('sheet-condition').textContent = '';
  document.getElementById('sh-feels').textContent = '—';
  document.getElementById('sh-hum').textContent = '—';
  document.getElementById('sh-wind').textContent = '—';

  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('on');

  fetch(`https://api.brightsky.dev/current_weather?lat=${lat}&lon=${lon}`)
    .then(r => r.json())
    .then(d => {
      const w = d.weather;
      const cond = getCond(w?.condition);
      document.getElementById('sheet-temp').textContent = fmt(w?.temperature) + '°';
      document.getElementById('sheet-icon').textContent = cond.icon;
      document.getElementById('sheet-condition').textContent = cond.label;
      const fl = feelsLike(w?.temperature, w?.relative_humidity, w?.wind_speed);
      document.getElementById('sh-feels').textContent = fmt(fl) + '°C';
      document.getElementById('sh-hum').textContent = fmt(w?.relative_humidity) + '%';
      document.getElementById('sh-wind').textContent = fmt(w?.wind_speed) + ' km/h ' + windDir(w?.wind_direction);
    })
    .catch(() => {});
}

function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

// ── HOURLY RENDER ──────────────────────────────
function renderHourly(hourly) {
  const track = document.getElementById('hourly-track');
  track.innerHTML = '';
  const nowH = new Date().getHours();
  let scrollTarget = null;

  hourly.forEach(h => {
    const hr = new Date(h.timestamp).getHours();
    const isNow = hr === nowH;
    const cond = getCond(h.condition);
    const prec = h.precipitation_probability != null ? Math.round(h.precipitation_probability)+'%' : (h.precipitation>0?'💧':'');

    const card = document.createElement('div');
    card.className = 'hour-card' + (isNow?' now':'');
    card.innerHTML = `
      <div class="hour-time">${isNow?'NOW':hr.toString().padStart(2,'0')+':00'}</div>
      <div class="hour-ico">${cond.icon}</div>
      <div class="hour-tmp">${fmt(h.temperature)}°</div>
      <div class="hour-prec">${prec||' '}</div>`;
    track.appendChild(card);
    if (isNow) scrollTarget = card;
  });
  if (scrollTarget) setTimeout(() => scrollTarget.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}), 150);
}

// ── CURVE RENDER ───────────────────────────────
function renderCurve(hourly) {
  const canvas = document.getElementById('temp-curve');
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 340;
  const H = 80;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const temps = hourly.map(h=>h.temperature).filter(t=>t!=null);
  if (temps.length < 2) return;

  const minT = Math.min(...temps)-2, maxT = Math.max(...temps)+2;
  const pad = {l:28,r:8,t:10,b:22};
  const pW = W-pad.l-pad.r, pH = H-pad.t-pad.b;
  const xi = i => pad.l+(i/(temps.length-1))*pW;
  const yi = t => pad.t+pH-((t-minT)/(maxT-minT))*pH;

  const grad = ctx.createLinearGradient(0,pad.t,0,H);
  grad.addColorStop(0,'rgba(26,86,219,0.18)');
  grad.addColorStop(1,'rgba(26,86,219,0.00)');

  ctx.beginPath();
  ctx.moveTo(xi(0),yi(temps[0]));
  for (let i=1;i<temps.length;i++) {
    const cpx=(xi(i-1)+xi(i))/2;
    ctx.bezierCurveTo(cpx,yi(temps[i-1]),cpx,yi(temps[i]),xi(i),yi(temps[i]));
  }
  ctx.lineTo(xi(temps.length-1),H); ctx.lineTo(xi(0),H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath();
  ctx.moveTo(xi(0),yi(temps[0]));
  for (let i=1;i<temps.length;i++) {
    const cpx=(xi(i-1)+xi(i))/2;
    ctx.bezierCurveTo(cpx,yi(temps[i-1]),cpx,yi(temps[i]),xi(i),yi(temps[i]));
  }
  ctx.strokeStyle='#1a56db'; ctx.lineWidth=2; ctx.stroke();

  ctx.fillStyle='#5a6a8a'; ctx.font='10px Inter,sans-serif'; ctx.textAlign='center';
  hourly.forEach((h,i)=>{ if(new Date(h.timestamp).getHours()%3===0) ctx.fillText(new Date(h.timestamp).getHours().toString().padStart(2,'0'),xi(i),H-4); });

  const nowH=new Date().getHours();
  const ni=hourly.findIndex(h=>new Date(h.timestamp).getHours()===nowH);
  if (ni>=0&&temps[ni]!=null) {
    ctx.beginPath(); ctx.arc(xi(ni),yi(temps[ni]),4,0,Math.PI*2);
    ctx.fillStyle='#1a56db'; ctx.fill();
    ctx.beginPath(); ctx.arc(xi(ni),yi(temps[ni]),4,0,Math.PI*2);
    ctx.strokeStyle='white'; ctx.lineWidth=2; ctx.stroke();
  }
}

// ── MAIN INIT ──────────────────────────────────
async function init() {
  hide('error-screen');
  hide('map-container');
  hide('current-strip');
  hide('scroll-panel');
  show('loading-screen');
  closeSheet();

  if (!navigator.geolocation) {
    hide('loading-screen'); show('error-screen');
    document.getElementById('err-title').textContent = 'GPS not supported';
    document.getElementById('err-msg').textContent = 'Your browser does not support geolocation.';
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    try {
      const [locName, weather] = await Promise.all([reverseGeocode(lat,lon), fetchWeather(lat,lon)]);
      const c = weather.current;
      const hourly = weather.hourly;
      const cond = getCond(c?.condition);
      const hour = new Date().getHours();

      setSkyBg(c?.condition, hour);

      // Strip
      document.getElementById('strip-loc').textContent = locName;
      document.getElementById('strip-temp').textContent = fmt(c?.temperature)+'°';
      document.getElementById('strip-icon').textContent = cond.icon;

      // Stats
      const fl = feelsLike(c?.temperature, c?.relative_humidity, c?.wind_speed);
      document.getElementById('s-feels').textContent = fmt(fl)+'°C';
      document.getElementById('s-hum').textContent   = fmt(c?.relative_humidity)+'%';
      document.getElementById('s-wind').textContent  = fmt(c?.wind_speed)+' km/h';
      document.getElementById('s-vis').textContent   = c?.visibility!=null ? fmt(c.visibility/1000,1)+' km' : '—';

      // Precip
      const pct = c?.precipitation_probability!=null ? Math.round(c.precipitation_probability)
        : (hourly[0]?.precipitation_probability!=null ? Math.round(hourly[0].precipitation_probability) : (c?.precipitation>0?75:5));
      document.getElementById('precip-pct').textContent = pct+'%';
      setTimeout(()=>{ document.getElementById('precip-fill').style.width=pct+'%'; },200);

      // Hourly
      if (hourly.length>0) {
        renderHourly(hourly);
        setTimeout(()=>renderCurve(hourly),60);
      }

      // Map
      initMap(lat, lon);

      const now=new Date();
      document.getElementById('updated-line').textContent =
        `Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · DWD via Bright Sky`;

      hide('loading-screen');
      show('map-container');
      show('current-strip');
      show('scroll-panel');

    } catch(err) {
      hide('loading-screen'); show('error-screen');
      document.getElementById('err-title').textContent = 'Could not load weather';
      document.getElementById('err-msg').textContent = 'Check your connection and try again.';
      console.error(err);
    }
  }, err => {
    hide('loading-screen'); show('error-screen');
    document.getElementById('err-title').textContent = 'Location access denied';
    document.getElementById('err-msg').textContent = 'Please allow location access in your browser settings and tap "Try again".';
  }, { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 });
}

window.addEventListener('DOMContentLoaded', init);
</script>
