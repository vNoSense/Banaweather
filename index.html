<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Weather</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e8f4fd">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weather">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --glass:rgba(255,255,255,0.82);
  --glass-border:rgba(255,255,255,0.95);
  --glass-shadow:rgba(30,80,160,0.10);
  --cobalt:#1a56db;
  --text:#1a1a2e;
  --muted:#5a6a8a;
  --rain:#3b82f6;
  --radius:18px;
}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#ddf0fb;color:var(--text);-webkit-font-smoothing:antialiased}
#sky-bg{position:fixed;inset:0;z-index:0;transition:background 2s ease;background:linear-gradient(175deg,#74c0e8 0%,#b8dff5 45%,#ddf0fb 100%)}

/* MAP */
#map-wrap{position:fixed;top:0;left:0;right:0;height:52vh;z-index:1}
#map{width:100%;height:100%}
.leaflet-control-attribution{font-size:9px!important}
.leaflet-control-zoom{display:none!important}

/* STRIP */
#strip{position:fixed;top:calc(52vh - 30px);left:0;right:0;z-index:10;padding:0 14px;display:flex;gap:8px;align-items:stretch;height:60px}
.strip-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:16px;padding:0 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px var(--glass-shadow)}
.strip-loc{flex:1;min-width:0}
.strip-loc-name{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.strip-temps{display:flex;align-items:baseline;gap:8px}
.strip-temp{font-family:'DM Sans',sans-serif;font-size:28px;font-weight:300;color:var(--text);line-height:1}
.strip-feels{font-size:13px;color:var(--muted)}
.strip-icon{width:42px;height:42px;flex-shrink:0}
.strip-icon svg{width:100%;height:100%}
.strip-btn{background:var(--glass);border:1px solid rgba(30,80,160,0.15);color:var(--muted);cursor:pointer;border-radius:12px;padding:0 14px;height:44px;font-size:18px;font-family:'Inter',sans-serif;flex-shrink:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 4px 24px var(--glass-shadow)}

/* PANEL */
#panel{position:fixed;top:calc(52vh + 38px);left:0;right:0;bottom:0;z-index:5;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 14px 40px;scrollbar-width:none}
#panel::-webkit-scrollbar{display:none}

/* STAT ROW */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.stat-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:12px 8px;text-align:center;box-shadow:0 2px 12px var(--glass-shadow)}
.stat-ico{font-size:17px;margin-bottom:4px}
.stat-val{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);line-height:1.1}
.stat-lbl{font-size:9px;color:var(--muted);font-weight:500;letter-spacing:.04em;margin-top:2px}

/* SECTION LABEL */
.sec{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 2px 7px}

/* PRECIP */
.precip-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px;box-shadow:0 2px 12px var(--glass-shadow);margin-bottom:8px}
.precip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.precip-lbl{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.precip-pct{font-size:16px;font-weight:700;color:var(--cobalt)}
.precip-track{height:8px;background:rgba(26,86,219,.10);border-radius:4px;overflow:hidden}
.precip-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#1a56db);border-radius:4px;transition:width 1s ease}

/* HOURLY */
.h-track{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none}
.h-track::-webkit-scrollbar{display:none}
.h-card{flex:0 0 62px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--glass-border);border-radius:16px;padding:10px 6px;text-align:center;box-shadow:0 2px 10px var(--glass-shadow)}
.h-card.now{border-color:var(--cobalt);background:rgba(26,86,219,.10)}
.h-time{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.05em;margin-bottom:6px}
.h-card.now .h-time{color:var(--cobalt)}
.h-ico{width:28px;height:28px;margin:0 auto 5px}
.h-ico svg{width:100%;height:100%}
.h-tmp{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text)}
.h-rain{font-size:10px;color:var(--rain);margin-top:3px;font-weight:600}

/* CURVE */
.curve-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 14px 10px;box-shadow:0 2px 12px var(--glass-shadow);margin-bottom:8px}
#curve{width:100%;display:block}

/* 7-DAY */
.week-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:0 2px 12px var(--glass-shadow);overflow:hidden;margin-bottom:8px}
.day-row{display:grid;grid-template-columns:76px 28px 1fr 46px 40px;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid rgba(26,86,219,.07)}
.day-row:last-child{border-bottom:none}
.day-name{font-size:13px;font-weight:600;color:var(--text)}
.day-ico{width:26px;height:26px}
.day-ico svg{width:100%;height:100%}
.day-bar-wrap{display:flex;align-items:center}
.day-bar-track{flex:1;height:5px;background:rgba(26,86,219,.10);border-radius:3px;overflow:hidden}
.day-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#60a5fa,#f59e0b)}
.day-hi{font-size:13px;font-weight:700;color:var(--text);text-align:right}
.day-lo{font-size:13px;color:var(--muted);text-align:right}

/* BOTTOM SHEET */
#sheet{position:fixed;bottom:0;left:0;right:0;z-index:100;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
#sheet.open{transform:translateY(0)}
#sheet-inner{background:rgba(225,242,252,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-radius:24px 24px 0 0;padding:12px 20px 44px;border-top:1px solid var(--glass-border);box-shadow:0 -8px 40px rgba(30,80,160,.13)}
#sheet-handle{width:40px;height:4px;background:rgba(30,80,160,.18);border-radius:2px;margin:0 auto 16px}
#sheet-close{float:right;background:rgba(30,80,160,.09);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;color:var(--muted);margin-top:-4px;display:flex;align-items:center;justify-content:center}
#sheet-name{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
#sheet-row{display:flex;align-items:center;gap:10px;margin-bottom:2px}
#sheet-temp{font-family:'DM Sans',sans-serif;font-size:54px;font-weight:300;color:var(--text);line-height:1}
#sheet-ico{width:52px;height:52px;flex-shrink:0}
#sheet-ico svg{width:100%;height:100%}
#sheet-cond{font-size:15px;color:var(--muted);margin:5px 0 14px}
.sh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sh-stat{background:rgba(255,255,255,.7);border:1px solid var(--glass-border);border-radius:14px;padding:10px;text-align:center}
.sh-stat-v{font-size:15px;font-weight:700;color:var(--text)}
.sh-stat-l{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.04em;text-transform:uppercase}

/* MY LOCATION DOT */
.my-dot{width:18px;height:18px;background:#1a56db;border:3px solid white;border-radius:50%;box-shadow:0 0 0 5px rgba(26,86,219,.22),0 2px 8px rgba(0,0,0,.2);animation:myPulse 2s ease infinite}
@keyframes myPulse{0%,100%{box-shadow:0 0 0 5px rgba(26,86,219,.22),0 2px 8px rgba(0,0,0,.2)}50%{box-shadow:0 0 0 12px rgba(26,86,219,.06),0 2px 8px rgba(0,0,0,.2)}}

/* AREA MARKERS */
.area-pin{background:rgba(255,255,255,.92);border:1.5px solid rgba(26,86,219,.22);border-radius:20px;padding:4px 10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#1a1a2e;white-space:nowrap;cursor:pointer;box-shadow:0 2px 10px rgba(30,80,160,.13);display:flex;align-items:center;gap:5px;transition:transform .15s}
.area-pin:active{transform:scale(.95)}
.pin-ico{width:18px;height:18px;display:inline-flex}
.pin-ico svg{width:100%;height:100%}
.pin-tmp{font-weight:700;color:#1a56db}
.zoom-low .pin-name{display:none}
.zoom-low .area-pin{padding:4px 7px;font-size:12px}

/* SKELETON */
#loading{position:fixed;inset:0;z-index:200;background:linear-gradient(175deg,#74c0e8 0%,#c8e8f7 50%,#ddf0fb 100%);display:flex;flex-direction:column;gap:10px;padding:0}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk{background:linear-gradient(90deg,rgba(255,255,255,.4) 25%,rgba(255,255,255,.7) 50%,rgba(255,255,255,.4) 75%);background-size:400px 100%;animation:shimmer 1.4s ease infinite;border-radius:14px}
.sk-map{height:52vh;border-radius:0}
.sk-strip{height:60px;margin:0 14px;border-radius:16px}
.sk-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 14px}
.sk-card{height:72px;border-radius:18px}
.sk-wide{height:48px;margin:0 14px;border-radius:18px}
.sk-hours{display:flex;gap:8px;padding:0 14px;overflow:hidden}
.sk-hour{width:62px;height:96px;flex-shrink:0;border-radius:16px}
.sk-loc{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:rgba(90,106,138,.8);padding:6px 0}
.loc-dot{width:8px;height:8px;background:var(--cobalt);border-radius:50%;animation:myPulse 1.5s ease infinite}

/* ERROR */
#error{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;background:linear-gradient(175deg,#74c0e8 0%,#e8f4fd 100%)}
.err-ico{font-size:48px}
.err-title{font-size:19px;font-weight:600;color:var(--text)}
.err-msg{font-size:14px;color:var(--muted);max-width:280px;line-height:1.5}
.err-btn{margin-top:4px;padding:11px 28px;background:#1a56db;color:white;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(26,86,219,.3)}

#overlay{position:fixed;inset:0;z-index:99;background:rgba(20,40,80,.18);opacity:0;pointer-events:none;transition:opacity .3s}
#overlay.on{opacity:1;pointer-events:all}
.hidden{display:none!important}
.updated{text-align:center;font-size:11px;color:var(--muted);padding-top:10px;letter-spacing:.03em}
</style>
</head>
<body>

<div id="sky-bg"></div>

<div id="loading">
  <div class="sk sk-map"></div>
  <div class="sk sk-strip"></div>
  <div class="sk-row">
    <div class="sk sk-card"></div><div class="sk sk-card"></div>
    <div class="sk sk-card"></div><div class="sk sk-card"></div>
  </div>
  <div class="sk sk-wide"></div>
  <div class="sk-hours">
    <div class="sk sk-hour"></div><div class="sk sk-hour"></div>
    <div class="sk sk-hour"></div><div class="sk sk-hour"></div>
    <div class="sk sk-hour"></div>
  </div>
  <div class="sk sk-wide"></div>
  <div class="sk-loc"><div class="loc-dot"></div><span>Locating you…</span></div>
</div>

<div id="error" class="hidden">
  <div class="err-ico">🌫️</div>
  <div class="err-title" id="err-title">Location unavailable</div>
  <div class="err-msg" id="err-msg">Enable location access in your browser settings.</div>
  <button class="err-btn" onclick="init()">Try again</button>
</div>

<div id="map-wrap" class="hidden"><div id="map"></div></div>

<div id="strip" class="hidden">
  <div class="strip-card strip-loc">
    <div class="strip-icon" id="strip-icon"></div>
    <div>
      <div class="strip-loc-name" id="strip-loc-name">—</div>
      <div class="strip-temps">
        <div class="strip-temp" id="strip-temp">—°</div>
        <div class="strip-feels" id="strip-feels"></div>
      </div>
    </div>
  </div>
  <button class="strip-btn" onclick="init()">↻</button>
</div>

<div id="panel" class="hidden">
  <div class="stat-row">
    <div class="stat-card"><div class="stat-ico">🌡️</div><div class="stat-val" id="s-feels">—</div><div class="stat-lbl">Feels like</div></div>
    <div class="stat-card"><div class="stat-ico">💧</div><div class="stat-val" id="s-hum">—</div><div class="stat-lbl">Humidity</div></div>
    <div class="stat-card"><div class="stat-ico">💨</div><div class="stat-val" id="s-wind">—</div><div class="stat-lbl">Wind</div></div>
    <div class="stat-card"><div class="stat-ico">👁️</div><div class="stat-val" id="s-vis">—</div><div class="stat-lbl">Visibility</div></div>
  </div>
  <div class="precip-card">
    <div class="precip-head">
      <span class="precip-lbl">Rain chance</span>
      <span class="precip-pct" id="precip-pct">—%</span>
    </div>
    <div class="precip-track"><div class="precip-fill" id="precip-fill" style="width:0%"></div></div>
  </div>
  <div class="sec">Hourly</div>
  <div class="h-track" id="h-track"></div>
  <div class="sec">Temperature today</div>
  <div class="curve-card"><canvas id="curve" height="110"></canvas></div>
  <div class="sec">Next 7 days</div>
  <div class="week-card" id="week-rows"></div>
  <div class="updated" id="updated"></div>
</div>

<div id="overlay" onclick="closeSheet()"></div>

<div id="sheet">
  <div id="sheet-inner">
    <div id="sheet-handle"></div>
    <button id="sheet-close" onclick="closeSheet()">✕</button>
    <div id="sheet-name">—</div>
    <div id="sheet-row">
      <div id="sheet-temp">—</div>
      <div id="sheet-ico"></div>
    </div>
    <div id="sheet-cond">—</div>
    <div class="sh-stats">
      <div class="sh-stat"><div class="sh-stat-v" id="sh-feels">—</div><div class="sh-stat-l">Feels like</div></div>
      <div class="sh-stat"><div class="sh-stat-v" id="sh-hum">—</div><div class="sh-stat-l">Humidity</div></div>
      <div class="sh-stat"><div class="sh-stat-v" id="sh-wind">—</div><div class="sh-stat-l">Wind</div></div>
    </div>
  </div>
</div>

<script>
// ── SVG ICONS ──────────────────────────────────────────────────────────────
function makeSVG(type) {
  var shapes = {
    sunny:
      '<circle cx="32" cy="32" r="12" fill="#FBBF24" stroke="#F59E0B" stroke-width="2"/>'
      + '<line x1="32" y1="8" x2="32" y2="14" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="32" y1="50" x2="32" y2="56" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>'

      + '<line x1="50" y1="32" x2="56" y2="32" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>'

      + '<line x1="19.7" y1="44.3" x2="15.5" y2="48.5" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>',

      '<circle cx="24" cy="24" r="10" fill="#FBBF24" stroke="#F59E0B" stroke-width="1.5"/>'

    cloudy:
      '<path d="M8 44 C8 37.5 13.5 33 20 34 C22 28 28 24 35 25 C43 26 49 32.5 48 40 C47 45 42.5 48 37.5 48 H17 C12 48 8 46.5 8 44Z" fill="white" stroke="#CBD5E1" stroke-width="1.5"/>',

      '<path d="M10 32 C10 25 16 20 23 21 C25 15 31 11 38 12 C46 13 52 20 51 28 C50 34 45 38 39 38 H17 C13 38 10 35.3 10 32Z" fill="#93C5FD" stroke="#60A5FA" stroke-width="1.5"/>'

      '<path d="M10 32 C10 25 16 20 23 21 C25 15 31 11 38 12 C46 13 52 20 51 28 C50 34 45 38 39 38 H17 C13 38 10 35.3 10 32Z" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>'

    sleet:
      '<path d="M10 32 C10 25 16 20 23 21 C25 15 31 11 38 12 C46 13 52 20 51 28 C50 34 45 38 39 38 H17 C13 38 10 35.3 10 32Z" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1.5"/>'

      + '<line x1="32" y1="44" x2="32" y2="52" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>'
      + '<line x1="44" y1="44" x2="41" y2="52" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>',
    thunderstorm:
      '<path d="M8 31 C8 24 14 19 21 20 C23 14 29 10 36 11 C44 12 50 19 49 27 C48 33 43 37 37 37 H15 C11 37 8 34.3 8 31Z" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>'
      + '<polyline points="34,38 27,50 33,50 26,62" fill="none" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>',
    fog:
      '<line x1="10" y1="22" x2="54" y2="22" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="6" y1="30" x2="58" y2="30" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="10" y1="38" x2="54" y2="38" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>'
      + '<line x1="14" y1="46" x2="50" y2="46" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>',
    hail:
      '<path d="M10 32 C10 25 16 20 23 21 C25 15 31 11 38 12 C46 13 52 20 51 28 C50 34 45 38 39 38 H17 C13 38 10 35.3 10 32Z" fill="#93C5FD" stroke="#60A5FA" stroke-width="1.5"/>'
      + '<circle cx="20" cy="50" r="3.5" fill="#60A5FA"/>'
      + '<circle cx="32" cy="50" r="3.5" fill="#60A5FA"/>'
      + '<circle cx="44" cy="50" r="3.5" fill="#60A5FA"/>'
  };
  var inner = shapes[type] || shapes.partlycloudy;
  return '<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">' + inner + '</svg>';
}

var COND_MAP = {
  dry:          { label: 'Clear',        svg: 'sunny' },
  fog:          { label: 'Foggy',        svg: 'fog' },
  rain:         { label: 'Rain',         svg: 'rain' },
  sleet:        { label: 'Sleet',        svg: 'sleet' },
  snow:         { label: 'Snow',         svg: 'snow' },
  hail:         { label: 'Hail',         svg: 'hail' },
  thunderstorm: { label: 'Thunderstorm', svg: 'thunderstorm' }
};

function getCond(code) {
  var c = COND_MAP[code] || { label: 'Partly Cloudy', svg: 'partlycloudy' };
  return { label: c.label, icon: makeSVG(c.svg) };
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function fmt(n, d) {
  if (n == null) return '—';
  return Number(n).toFixed(d || 0);
}

function windDir(deg) {
  if (deg == null) return '';
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg / 45) % 8];
}

function feelsLike(T, RH, V) {
  if (T == null) return null;
  if (V != null && T < 10 && V > 4.8)
    return 13.12 + 0.6215*T - 11.37*Math.pow(V, 0.16) + 0.3965*T*Math.pow(V, 0.16);
  if (RH != null && T > 26)
    return -8.78469 + 1.61139411*T + 2.3385*RH - 0.14611*T*RH
           - 0.012308*T*T - 0.016424*RH*RH + 0.002211*T*T*RH
           + 0.00072546*T*RH*RH - 0.000003582*T*T*RH*RH;
  return T;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function fadeIn(id, delay) {
  setTimeout(function() {
    var el = document.getElementById(id);
    el.classList.remove('hidden');
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    requestAnimationFrame(function() {
      el.style.transition = 'opacity .4s ease, transform .4s ease';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    });
  }, delay || 0);
}

// ── SKY BACKGROUND ─────────────────────────────────────────────────────────
function setSkyBg(condition, hour) {
  var bg = document.getElementById('sky-bg');
  var skies = {
    rain:         'linear-gradient(175deg,#7bafc9 0%,#a8cde0 50%,#c5dded 100%)',
    thunderstorm: 'linear-gradient(175deg,#6a7fa0 0%,#8aa0be 50%,#b0c4d8 100%)',
    snow:         'linear-gradient(175deg,#c8dff0 0%,#deeef8 50%,#edf6fb 100%)',
    fog:          'linear-gradient(175deg,#a0b4c8 0%,#c0d2e0 50%,#d8e8f0 100%)'
  };
  if (skies[condition]) { bg.style.background = skies[condition]; return; }
  if (hour >= 6 && hour < 9)        bg.style.background = 'linear-gradient(175deg,#f9c97c 0%,#fde4a8 40%,#c9e8f7 100%)';
  else if (hour >= 9 && hour < 17)  bg.style.background = 'linear-gradient(175deg,#74c0e8 0%,#a8d8f0 40%,#daf0fc 100%)';
  else if (hour >= 17 && hour < 20) bg.style.background = 'linear-gradient(175deg,#f0845a 0%,#f7b87a 40%,#c8e0f4 100%)';
  else                              bg.style.background = 'linear-gradient(175deg,#1a2a4a 0%,#2a4a7a 40%,#4a7aaa 100%)';
}

// ── REVERSE GEOCODE ────────────────────────────────────────────────────────
async function reverseGeocode(lat, lon) {
  try {
    var res = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json');
    var data = await res.json();
    var a = data.address;
    return a.suburb || a.neighbourhood || a.quarter || a.city_district || a.city || a.town || a.village || 'Your area';
  } catch(e) { return 'Your area'; }
}

// ── FETCH WEATHER ──────────────────────────────────────────────────────────
async function fetchCurrent(lat, lon) {
  var res = await fetch('https://api.brightsky.dev/current_weather?lat=' + lat + '&lon=' + lon);
  var data = await res.json();
  return data.weather;
}

async function fetchHourly(lat, lon) {
  var date = new Date().toISOString().split('T')[0];
  var res = await fetch('https://api.brightsky.dev/weather?lat=' + lat + '&lon=' + lon + '&date=' + date + '&last_date=' + date + 'T23:59:00');
  var data = await res.json();
  return data.weather || [];
}

async function fetchWeek(lat, lon) {
  var today = new Date();
  var start = today.toISOString().split('T')[0];
  var end = new Date(today.getTime() + 7 * 86400000).toISOString().split('T')[0];
  var res = await fetch('https://api.brightsky.dev/weather?lat=' + lat + '&lon=' + lon + '&date=' + start + '&last_date=' + end + 'T23:59:00');
  var data = await res.json();
  return data.weather || [];
}

function updateZoom() {
  if (!map) return;
  var z = map.getZoom();
  areaEls.forEach(function(el) {
    if (z <= 10) el.classList.add('zoom-low');
    else el.classList.remove('zoom-low');
  });
}

function initMap(lat, lon) {
  if (map) { map.remove(); map = null; }
  areaEls = [];

  map = L.map('map', { center: [lat, lon], zoom: 11, zoomControl: false });

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  setTimeout(function() { map.invalidateSize({ animate: false }); }, 50);
  setTimeout(function() { map.invalidateSize({ animate: false }); }, 300);
  setTimeout(function() { map.invalidateSize({ animate: false }); }, 800);

  map.on('zoomend', function() {
    map.invalidateSize({ animate: false });
    updateZoom();
  });

  var myIcon = L.divIcon({ className: '', html: '<div class="my-dot"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
  L.marker([lat, lon], { icon: myIcon }).addTo(map);

  AREAS.forEach(function(area) {
    var el = document.createElement('div');
    el.className = 'area-pin';
    el.innerHTML = '<span class="pin-ico">' + makeSVG('partlycloudy') + '</span>'
      + '<span class="pin-name">' + area.name + '</span>'
      + '<span class="pin-tmp">…°</span>';

    var icon = L.divIcon({ className: '', html: el, iconSize: null, iconAnchor: [0, 10] });
    var marker = L.marker([area.lat, area.lon], { icon: icon }).addTo(map);

    fetch('https://api.brightsky.dev/current_weather?lat=' + area.lat + '&lon=' + area.lon)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var w = d.weather;
        var cond = getCond(w && w.condition);
        el.querySelector('.pin-ico').innerHTML = cond.icon;
        el.querySelector('.pin-tmp').textContent = fmt(w && w.temperature) + '°';
      })
      .catch(function() {});

    marker.on('click', function() { openSheet(area.name, area.lat, area.lon); });
    areaEls.push(el);
  });

  updateZoom();
}

// ── BOTTOM SHEET ───────────────────────────────────────────────────────────
function openSheet(name, lat, lon) {
  document.getElementById('sheet-name').textContent = name;
  document.getElementById('sheet-temp').textContent = '…';
  document.getElementById('sheet-ico').innerHTML = makeSVG('partlycloudy');
  document.getElementById('sheet-cond').textContent = '';
  document.getElementById('sh-feels').textContent = '—';
  document.getElementById('sh-hum').textContent = '—';
  document.getElementById('sh-wind').textContent = '—';
  document.getElementById('sheet').classList.add('open');
  document.getElementById('overlay').classList.add('on');

  fetch('https://api.brightsky.dev/current_weather?lat=' + lat + '&lon=' + lon)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var w = d.weather;
      var cond = getCond(w && w.condition);
      document.getElementById('sheet-temp').textContent = fmt(w && w.temperature) + '°';
      document.getElementById('sheet-ico').innerHTML = cond.icon;
      document.getElementById('sheet-cond').textContent = cond.label;
      var fl = feelsLike(w && w.temperature, w && w.relative_humidity, w && w.wind_speed);
      document.getElementById('sh-feels').textContent = fmt(fl) + '°C';
      document.getElementById('sh-hum').textContent = fmt(w && w.relative_humidity) + '%';
      var ws = w && w.wind_speed;
      document.getElementById('sh-wind').textContent = ws != null ? fmt(ws) + ' km/h ' + windDir(w.wind_direction) : '—';
    })
    .catch(function() {});
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

// ── RENDER HOURLY ──────────────────────────────────────────────────────────
function renderHourly(hourly) {
  var track = document.getElementById('h-track');
  track.innerHTML = '';
  var nowH = new Date().getHours();
  var scrollTarget = null;

  hourly.forEach(function(h) {
    var hr = new Date(h.timestamp).getHours();
    var isNow = hr === nowH;
    var cond = getCond(h.condition);
    var prec = h.precipitation_probability != null
      ? Math.round(h.precipitation_probability) + '%'
      : (h.precipitation > 0 ? '💧' : '');

    var card = document.createElement('div');
    card.className = 'h-card' + (isNow ? ' now' : '');
    card.innerHTML = '<div class="h-time">' + (isNow ? 'NOW' : String(hr).padStart(2,'0') + ':00') + '</div>'
      + '<div class="h-ico">' + cond.icon + '</div>'
      + '<div class="h-tmp">' + fmt(h.temperature) + '°</div>'
      + '<div class="h-rain">' + (prec || ' ') + '</div>';
    track.appendChild(card);
    if (isNow) scrollTarget = card;
  });

  if (scrollTarget) {
    setTimeout(function() {
      scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }, 150);
  }
}

// ── RENDER CURVE ───────────────────────────────────────────────────────────
function renderCurve(hourly) {
  var canvas = document.getElementById('curve');
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 340;
  var H = 110;
  canvas.width = W;
  canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  var temps = hourly.map(function(h) { return h.temperature; }).filter(function(t) { return t != null; });
  if (temps.length < 2) return;

  var minT = Math.min.apply(null, temps) - 1;
  var maxT = Math.max.apply(null, temps) + 1;
  var pad = { l: 10, r: 10, t: 22, b: 22 };
  var pW = W - pad.l - pad.r;
  var pH = H - pad.t - pad.b;

  function xi(i) { return pad.l + (i / (temps.length - 1)) * pW; }
  function yi(t) { return pad.t + pH - ((t - minT) / (maxT - minT)) * pH; }

  // Fill gradient
  var fillGrad = ctx.createLinearGradient(0, pad.t, 0, H);
  fillGrad.addColorStop(0, 'rgba(26,86,219,0.18)');
  fillGrad.addColorStop(0.7, 'rgba(26,86,219,0.06)');
  fillGrad.addColorStop(1, 'rgba(26,86,219,0)');
  ctx.beginPath();
  ctx.moveTo(xi(0), yi(temps[0]));
  for (var i = 1; i < temps.length; i++) {
    var cpx = (xi(i-1) + xi(i)) / 2;
    ctx.bezierCurveTo(cpx, yi(temps[i-1]), cpx, yi(temps[i]), xi(i), yi(temps[i]));
  }
  ctx.lineTo(xi(temps.length - 1), H);
  ctx.lineTo(xi(0), H);
  ctx.closePath();
  ctx.fillStyle = fillGrad;
  ctx.fill();

  // Line gradient
  var lineGrad = ctx.createLinearGradient(0, 0, W, 0);
  lineGrad.addColorStop(0, '#60a5fa');
  lineGrad.addColorStop(0.5, '#1a56db');
  lineGrad.addColorStop(1, '#f59e0b');
  ctx.beginPath();
  ctx.moveTo(xi(0), yi(temps[0]));
  for (var j = 1; j < temps.length; j++) {
    var cpx2 = (xi(j-1) + xi(j)) / 2;
    ctx.bezierCurveTo(cpx2, yi(temps[j-1]), cpx2, yi(temps[j]), xi(j), yi(temps[j]));
  }
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Temp labels + hour labels every 3h
  hourly.forEach(function(h, idx) {
    var hr = new Date(h.timestamp).getHours();
    if (hr % 3 === 0 && h.temperature != null) {
      ctx.font = 'bold 11px Inter,sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'center';
      ctx.fillText(Math.round(h.temperature) + '°', xi(idx), yi(h.temperature) - 7);
      ctx.font = '10px Inter,sans-serif';
      ctx.fillStyle = '#5a6a8a';
      ctx.fillText(String(hr).padStart(2,'0'), xi(idx), H - 5);
    }
  });

  // NOW dot
  var nowH = new Date().getHours();
  var ni = -1;
  for (var k = 0; k < hourly.length; k++) {
    if (new Date(hourly[k].timestamp).getHours() === nowH) { ni = k; break; }
  }
  if (ni >= 0 && temps[ni] != null) {
    ctx.beginPath();
    ctx.arc(xi(ni), yi(temps[ni]), 5, 0, Math.PI * 2);
    ctx.fillStyle = '#1a56db';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(xi(ni), yi(temps[ni]), 5, 0, Math.PI * 2);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }
}

// ── RENDER 7-DAY ───────────────────────────────────────────────────────────
function render7Day(allHourly) {
  var container = document.getElementById('week-rows');
  container.innerHTML = '';

  var days = {};
  allHourly.forEach(function(h) {
    var key = new Date(h.timestamp).toISOString().split('T')[0];
    if (!days[key]) days[key] = { temps: [], conditions: [], date: new Date(h.timestamp) };
    if (h.temperature != null) days[key].temps.push(h.temperature);
    if (h.condition) days[key].conditions.push(h.condition);
  });

  var dayKeys = Object.keys(days).slice(0, 7);
  var allTemps = [];
  dayKeys.forEach(function(k) { allTemps = allTemps.concat(days[k].temps); });
  var globalMin = Math.min.apply(null, allTemps);
  var globalMax = Math.max.apply(null, allTemps);

  var DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var todayKey = new Date().toISOString().split('T')[0];

  dayKeys.forEach(function(key) {
    var day = days[key];
    if (!day.temps.length) return;

    var hi = Math.max.apply(null, day.temps);
    var lo = Math.min.apply(null, day.temps);

    var condCount = {};
    day.conditions.forEach(function(c) { condCount[c] = (condCount[c] || 0) + 1; });
    var mainCond = Object.keys(condCount).sort(function(a,b) { return condCount[b] - condCount[a]; })[0];
    var cond = getCond(mainCond);

    var isToday = key === todayKey;
    var label = isToday ? 'Today' : DAY_NAMES[day.date.getDay()];
    var barLeft = ((lo - globalMin) / (globalMax - globalMin || 1)) * 100;
    var barWidth = Math.max(((hi - lo) / (globalMax - globalMin || 1)) * 100, 8);

    var row = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = '<div class="day-name" style="' + (isToday ? 'color:var(--cobalt)' : '') + '">' + label + '</div>'
      + '<div class="day-ico">' + cond.icon + '</div>'
      + '<div class="day-bar-wrap"><div class="day-bar-track">'
      + '<div class="day-bar-fill" style="margin-left:' + barLeft + '%;width:' + barWidth + '%"></div>'
      + '</div></div>'
      + '<div class="day-hi">' + fmt(hi) + '°</div>'
      + '<div class="day-lo">' + fmt(lo) + '°</div>';
    container.appendChild(row);
  });
}

// ── MAIN INIT ──────────────────────────────────────────────────────────────
async function init() {
  hide('error');
  hide('map-wrap');
  hide('strip');
  hide('panel');
  show('loading');
  closeSheet();

  if (!navigator.geolocation) {
    hide('loading'); show('error');
    document.getElementById('err-title').textContent = 'GPS not supported';
    document.getElementById('err-msg').textContent = 'Your browser does not support geolocation.';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      try {
        var results = await Promise.all([
          reverseGeocode(lat, lon),
          fetchCurrent(lat, lon),
          fetchHourly(lat, lon),
          fetchWeek(lat, lon)
        ]);

        var locName  = results[0];
        var current  = results[1];
        var hourly   = results[2];
        var weekData = results[3];

        var hour = new Date().getHours();
        var cond = getCond(current && current.condition);

        setSkyBg(current && current.condition, hour);

        // Strip
        document.getElementById('strip-icon').innerHTML = cond.icon;
        document.getElementById('strip-loc-name').textContent = locName;
        document.getElementById('strip-temp').textContent = fmt(current && current.temperature) + '°';

        // Wind (fall back to first hourly reading if station has no data)
        var windSpeed = (current && current.wind_speed != null)
          ? current.wind_speed
          : (hourly.find(function(h) { return h.wind_speed != null; }) || {}).wind_speed || null;
        var windDeg = (current && current.wind_direction != null)
          ? current.wind_direction
          : (hourly.find(function(h) { return h.wind_direction != null; }) || {}).wind_direction || null;

        // Feels like
        var fl = feelsLike(current && current.temperature, current && current.relative_humidity, windSpeed);
        if (fl != null) document.getElementById('strip-feels').textContent = 'Feels ' + fmt(fl) + '°';
        document.getElementById('s-feels').textContent = fl != null ? fmt(fl) + '°C' : '—';

        // Stats
        document.getElementById('s-hum').textContent  = fmt(current && current.relative_humidity) + '%';
        document.getElementById('s-wind').textContent = windSpeed != null ? fmt(windSpeed) + ' km/h ' + windDir(windDeg) : '—';
        var vis = current && current.visibility;
        document.getElementById('s-vis').textContent  = vis != null ? fmt(vis / 1000, 1) + ' km' : '—';

        // Precip
        var pct = (current && current.precipitation_probability != null)
          ? Math.round(current.precipitation_probability)
          : (hourly[0] && hourly[0].precipitation_probability != null ? Math.round(hourly[0].precipitation_probability) : (current && current.precipitation > 0 ? 75 : 5));
        document.getElementById('precip-pct').textContent = pct + '%';
        setTimeout(function() { document.getElementById('precip-fill').style.width = pct + '%'; }, 200);

        // Hourly + curve + 7-day
        if (hourly.length) {
          renderHourly(hourly);
          setTimeout(function() { renderCurve(hourly); }, 60);
        }
        if (weekData.length) render7Day(weekData);

        // Map
        initMap(lat, lon);

        // Updated line
        var now = new Date();
        document.getElementById('updated').textContent =
          'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' · DWD via Bright Sky';

        // Fade in UI
        hide('loading');
        fadeIn('map-wrap', 0);
        fadeIn('strip', 80);
        fadeIn('panel', 160);

        // Re-check map size after fade
        setTimeout(function() { if (map) map.invalidateSize({ animate: false }); }, 220);

      } catch(err) {
        hide('loading'); show('error');
        document.getElementById('err-title').textContent = 'Could not load weather';
        document.getElementById('err-msg').textContent = 'Error: ' + (err && err.message ? err.message : String(err));
        console.error(err);
      }
    },
    function() {
      hide('loading'); show('error');
      document.getElementById('err-title').textContent = 'Location access denied';
      document.getElementById('err-msg').textContent = 'Please allow location access in your browser settings and tap "Try again".';
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 60000 }
  );
}

window.addEventListener('DOMContentLoaded', init);
